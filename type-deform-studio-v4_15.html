
<style>
*{box-sizing:border-box;margin:0;padding:0}
.studio{display:grid;grid-template-columns:270px 1fr;min-height:560px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.panel{background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);padding:12px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;max-height:660px}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.canvas-area{display:flex;flex-direction:column}
.canvas-wrap{flex:1;position:relative;min-height:380px;background:#e8e8e6;display:flex;align-items:center;justify-content:center;overflow:hidden}
.canvas-wrap canvas{display:block}
.toolbar{display:flex;gap:6px;padding:8px 12px;border-top:0.5px solid var(--color-border-tertiary);align-items:center;flex-wrap:wrap}
.sl{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--color-text-secondary);padding-bottom:3px;border-bottom:0.5px solid var(--color-border-tertiary)}
.cr{display:flex;flex-direction:column;gap:1px}
.cr label{font-size:11px;color:var(--color-text-secondary);display:flex;justify-content:space-between}
.cr label span{color:var(--color-text-primary);font-weight:500}
.cr input[type=range]{width:100%}
.ti{width:100%;padding:8px 10px;font-size:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);resize:vertical;font-family:inherit;min-height:42px;field-sizing:content;line-height:1.5}
.sg{display:flex;gap:3px;flex-wrap:wrap}
.sb{font-size:10px;padding:3px 7px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;white-space:nowrap}
.sb.a{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.cw{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.sw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.sw.a{border-color:var(--color-text-primary);transform:scale(1.15)}
.btn{font-size:11px;padding:5px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary)}
.btn.pr{background:var(--color-text-primary);color:var(--color-background-primary)}
.dv{height:0.5px;background:var(--color-border-tertiary)}
.pr2{display:flex;gap:3px;flex-wrap:wrap}
.pl{display:flex;border-radius:4px;overflow:hidden;cursor:pointer;border:1.5px solid transparent}
.pl.a{border-color:var(--color-text-primary)}
.pl span{width:13px;height:13px}
.gr-prev{height:22px;border-radius:4px;cursor:pointer;border:1.5px solid transparent;flex:1;min-width:40px}
.gr-prev.a{border-color:var(--color-text-primary)}
.font-up{display:flex;gap:4px;align-items:center}
.font-up label{font-size:10px;padding:3px 8px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer}
.font-up label:hover{color:var(--color-text-primary)}
.font-st{font-size:9px;color:var(--color-text-secondary);margin-top:1px}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<h2 class="sr-only">Type Deform Studio v3</h2>
<div class="studio">
<div class="panel">
  <div class="sl">Текст</div>
  <textarea class="ti" id="tI">TYPE STUDIO</textarea>
  <div class="cr"><label>Размер <span id="v1">80</span></label><input type="range" id="s1" min="16" max="180" value="80"></div>
  <div class="cr"><label>Толщина шрифта <span id="v2">800</span></label><input type="range" id="s2" min="100" max="900" value="800" step="100"></div>
  <div class="cr"><label>Жирность контура <span id="vSW">0</span>px</label><input type="range" id="sSW" min="0" max="30" value="0" step="0.5"></div>
  <div class="cr"><label>Интерлиньяж <span id="v3">1.15</span></label><input type="range" id="s3" min="0.5" max="3" value="1.15" step="0.05"></div>
  <div class="cr"><label>Трекинг <span id="v4">0</span>px</label><input type="range" id="s4" min="-10" max="40" value="0" step="1"></div>

  <div class="dv"></div>
  <div class="sl">Деформация</div>
  <div class="cr"><label>Дуга вверх <span id="v5">0</span>%</label><input type="range" id="s5" min="0" max="100" value="0"></div>
  <div class="cr"><label>Дуга вниз <span id="v6">0</span>%</label><input type="range" id="s6" min="0" max="100" value="0"></div>
  <div class="cr"><label>Рыбий глаз <span id="v7">0</span>%</label><input type="range" id="s7" min="0" max="100" value="0"></div>
  <div class="cr"><label>Волна <span id="v8">0</span>%</label><input type="range" id="s8" min="0" max="100" value="0"></div>

  <div class="dv"></div>
  <div class="sl">Мягкий текст</div>
  <div class="cr"><label>Блюр <span id="v9">0</span>px</label><input type="range" id="s9" min="0" max="8" value="0" step="0.5"></div>

  <div class="dv"></div>
  <div class="sl">Скругление букв</div>
  <div class="cr"><label>Радиус <span id="v10">0</span></label><input type="range" id="s10" min="0" max="40" value="0" step="0.5"></div>
  <div class="font-up">
    <label for="fontFile">Загрузить TTF/OTF</label>
    <input type="file" id="fontFile" accept=".ttf,.otf,.woff" style="display:none">
  </div>
  <div class="font-st" id="fontSt">Inter (Latin + Кириллица) встроен</div>

  <div class="dv"></div>
  <div class="sl">Формат</div>
  <div class="sg" id="fmtB">
    <button class="sb a" data-f="1x1">1:1</button>
    <button class="sb" data-f="4x5">4:5</button>
    <button class="sb" data-f="16x9">16:9</button>
    <button class="sb" data-f="custom">Свой</button>
  </div>
  <div id="customSize" style="display:none;margin-top:4px;gap:4px;align-items:center">
    <input type="number" id="cwIn" value="1080" min="100" max="4000" style="width:60px;padding:3px 5px;font-size:11px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)">
    <span style="font-size:11px;color:var(--color-text-secondary)">×</span>
    <input type="number" id="chIn" value="1080" min="100" max="4000" style="width:60px;padding:3px 5px;font-size:11px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)">
    <span style="font-size:9px;color:var(--color-text-secondary)">px</span>
  </div>
  <div style="margin-top:4px">
    <button class="sb" id="noBgBtn">Без фона</button>
  </div>

  <div class="dv"></div>
  <div class="sl">Цвет текста</div>
  <div class="cw" id="tcP"></div>

  <div class="dv"></div>
  <div class="sl">Фон</div>
  <div class="sg" id="bgMode">
    <button class="sb a" data-m="solid">Цвет</button>
    <button class="sb" data-m="gradient">Градиент</button>
  </div>
  <div class="cw" id="bcP"></div>
  <div id="gradientPanel" style="display:none">
    <div class="pr2" id="grPick" style="gap:5px"></div>
  </div>

  <div class="dv"></div>
  <div class="sl">Фигуры</div>
  <div class="sg" id="shT">
    <button class="sb a" data-s="circle">○ Круги</button>
    <button class="sb a" data-s="square">□ Квадр.</button>
    <button class="sb a" data-s="triangle">△ Треуг.</button>
  </div>
  <div class="cr"><label>Кол-во <span id="vA">8</span></label><input type="range" id="sA" min="0" max="40" value="8"></div>
  <div class="cr"><label>Размер <span id="vB">50</span></label><input type="range" id="sB" min="8" max="180" value="50"></div>
  <div class="cr"><label>Прозрачность <span id="vC">0.30</span></label><input type="range" id="sC" min="0.05" max="1" value="0.3" step="0.05"></div>
  <div class="cr"><label>Скругление <span id="vD">0</span>%</label><input type="range" id="sD" min="0" max="100" value="0"></div>

  <div class="dv"></div>
  <div class="sl">Палитра фигур</div>
  <div class="pr2" id="pP"></div>
</div>

<div class="canvas-area">
  <div class="canvas-wrap" id="cW"><canvas id="mc"></canvas></div>
  <div class="toolbar">
    <button class="btn" id="rndBtn"><i class="ti ti-refresh" aria-hidden="true"></i> Рандомайзер</button>
    <button class="btn" id="rndClr"><i class="ti ti-color-swatch" aria-hidden="true"></i> Случайные цвета</button>
    <div style="flex:1"></div>
    <button class="btn pr" id="dP"><i class="ti ti-download" aria-hidden="true"></i> PNG</button>
    <button class="btn" id="dJ"><i class="ti ti-photo" aria-hidden="true"></i> JPG</button>
  </div>
</div>
</div>

let otFonts={},customFont=null;
const glyphCache={};

async function initFonts(){
  for(const w of [400,900]){
    try{
      const bin=atob(FONT_B64[w]);
      const buf=new ArrayBuffer(bin.length);
      const u8=new Uint8Array(buf);
      for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
      otFonts[w]=opentype.parse(buf);
    }catch(e){console.error('Font parse err',e)}
  }
  const st=document.getElementById('fontSt');
  if(st) st.textContent=otFonts[900]?'Inter (Latin + Кириллица) готов':'Ошибка загрузки';
  render();
}

document.getElementById('fontFile').onchange=async function(e){
  const file=e.target.files[0];if(!file)return;
  try{
    const buf=await file.arrayBuffer();
    customFont=opentype.parse(buf);
    Object.keys(glyphCache).forEach(k=>delete glyphCache[k]);
    document.getElementById('fontSt').textContent=file.name+' загружен';
    render();
  }catch(err){
    document.getElementById('fontSt').textContent='Ошибка: '+err.message;
  }
};

function getFont(){
  if(customFont)return customFont;
  const w=S.fw;
  if(otFonts[w])return otFonts[w];
  return w>=600?otFonts[900]:otFonts[400];
}

function roundPathCorners(cmds,radius){
  if(radius<=0||!cmds.length)return cmds;
  const contours=[];let cur=[];
  for(const c of cmds){
    if(c.type==='M'&&cur.length>0){contours.push(cur);cur=[]}
    cur.push(c);
    if(c.type==='Z'){contours.push(cur);cur=[]}
  }
  if(cur.length)contours.push(cur);
  const result=[];
  for(const contour of contours){
    const segs=[];
    for(const c of contour){if(c.type!=='Z')segs.push({...c})}
    const n=segs.length;
    if(n<3){result.push(...contour);continue}
    const out=[];
    for(let i=0;i<n;i++){
      const curr=segs[i],prev=segs[(i-1+n)%n],next=segs[(i+1)%n];
      let inDx,inDy;
      if(curr.type==='C'){
        inDx=curr.x-curr.x2;inDy=curr.y-curr.y2;
        if(Math.hypot(inDx,inDy)<0.5){inDx=curr.x-curr.x1;inDy=curr.y-curr.y1}
        if(Math.hypot(inDx,inDy)<0.5){inDx=curr.x-prev.x;inDy=curr.y-prev.y}
      }else if(curr.type==='Q'){
        inDx=curr.x-curr.x1;inDy=curr.y-curr.y1;
        if(Math.hypot(inDx,inDy)<0.5){inDx=curr.x-prev.x;inDy=curr.y-prev.y}
      }else{inDx=curr.x-prev.x;inDy=curr.y-prev.y}
      let outDx,outDy;
      if(next.type==='C'){
        outDx=next.x1-curr.x;outDy=next.y1-curr.y;
        if(Math.hypot(outDx,outDy)<0.5){outDx=next.x2-curr.x;outDy=next.y2-curr.y}
        if(Math.hypot(outDx,outDy)<0.5){outDx=next.x-curr.x;outDy=next.y-curr.y}
      }else if(next.type==='Q'){
        outDx=next.x1-curr.x;outDy=next.y1-curr.y;
        if(Math.hypot(outDx,outDy)<0.5){outDx=next.x-curr.x;outDy=next.y-curr.y}
      }else{outDx=next.x-curr.x;outDy=next.y-curr.y}
      const inLen=Math.hypot(inDx,inDy),outLen=Math.hypot(outDx,outDy);
      if(inLen<0.1||outLen<0.1){
        if(i===0)out.push({type:'M',x:curr.x,y:curr.y});
        else if(curr.type==='C')out.push({type:'C',x1:curr.x1,y1:curr.y1,x2:curr.x2,y2:curr.y2,x:curr.x,y:curr.y});
        else if(curr.type==='Q')out.push({type:'Q',x1:curr.x1,y1:curr.y1,x:curr.x,y:curr.y});
        else out.push({type:'L',x:curr.x,y:curr.y});
        continue;
      }
      const dot=(inDx*outDx+inDy*outDy)/(inLen*outLen);
      if(dot>0.7){
        if(i===0)out.push({type:'M',x:curr.x,y:curr.y});
        else if(curr.type==='C')out.push({type:'C',x1:curr.x1,y1:curr.y1,x2:curr.x2,y2:curr.y2,x:curr.x,y:curr.y});
        else if(curr.type==='Q')out.push({type:'Q',x1:curr.x1,y1:curr.y1,x:curr.x,y:curr.y});
        else out.push({type:'L',x:curr.x,y:curr.y});
        continue;
      }
      const bkDx=-inDx/inLen,bkDy=-inDy/inLen;
      const fwDx=outDx/outLen,fwDy=outDy/outLen;
      const maxR1=Math.min(inLen*.45,radius);
      const maxR2=Math.min(outLen*.45,radius);
      const r=Math.min(maxR1,maxR2);
      const p1x=curr.x+bkDx*r,p1y=curr.y+bkDy*r;
      const p2x=curr.x+fwDx*r,p2y=curr.y+fwDy*r;
      if(curr.type==='C'){
        out.push({type:'C',x1:curr.x1,y1:curr.y1,x2:curr.x2,y2:curr.y2,x:p1x,y:p1y});
      }else if(curr.type==='Q'){
        out.push({type:'Q',x1:curr.x1,y1:curr.y1,x:p1x,y:p1y});
      }else{
        out.push({type:i===0?'M':'L',x:p1x,y:p1y});
      }
      out.push({type:'Q',x1:curr.x,y1:curr.y,x:p2x,y:p2y});
    }
    out.push({type:'Z'});result.push(...out);
  }
  return result;
}

function getCachedGlyph(font,char,fontSize,roundR){
  const key=char+'_'+fontSize+'_'+roundR+'_'+(customFont?'c':'e')+'_'+S.fw;
  if(glyphCache[key])return glyphCache[key];
  const glyph=font.charToGlyph(char);
  if(!glyph||glyph.index===0)return null;
  const path=glyph.getPath(0,0,fontSize);
  let cmds=path.commands;
  if(roundR>0)cmds=roundPathCorners(cmds,roundR);
  const p2d=new Path2D();
  for(const c of cmds){
    switch(c.type){
      case'M':p2d.moveTo(c.x,c.y);break;
      case'L':p2d.lineTo(c.x,c.y);break;
      case'C':p2d.bezierCurveTo(c.x1,c.y1,c.x2,c.y2,c.x,c.y);break;
      case'Q':p2d.quadraticCurveTo(c.x1,c.y1,c.x,c.y);break;
      case'Z':p2d.closePath();break;
    }
  }
  const adv=glyph.advanceWidth*(fontSize/font.unitsPerEm);
  const r={path:p2d,advance:adv};
  glyphCache[key]=r;
  return r;
}

const cv=document.getElementById('mc'), cx=cv.getContext('2d');

const PAL=[
  {n:'Mono',c:['#1a1a1a','#555','#999','#ccc','#eee']},
  {n:'Neon',c:['#ff2d55','#ff9500','#ffcc00','#34c759','#007aff']},
  {n:'Pastel',c:['#f7c5c5','#fce0b8','#c8e6c9','#bbdefb','#e1bee7']},

let S={
  text:'TYPE STUDIO',fs:80,fw:800,lead:1.15,track:0,
  arcUp:0,arcDown:0,fisheye:0,wave:0,blur:0,roundness:0,strokeW:0,
  fmt:'1x1',customW:1080,customH:1080,noBg:false,bgMode:'solid',bgColor:'#f5f4f0',txColor:'#1a1916',
  grad:GRADS[0],
  shapes:[],shTypes:{circle:true,square:true,triangle:true},
  shCount:8,shSize:50,shOpac:0.3,shRound:0,
  pal:PAL[1],seed:Math.random()
};

function csz(){
  const W=document.getElementById('cW').clientWidth||480,mH=480;
  if(S.fmt==='custom'){const r=S.customW/S.customH;const h=Math.min(W/r,mH);return[Math.round(h*r),Math.round(h)]}
  if(S.fmt==='1x1'){const s=Math.min(W,mH);return[s,s]}
  if(S.fmt==='4x5'){const h=Math.min(W*1.25,mH);return[Math.round(h*0.8),Math.round(h)]}
  if(S.fmt==='16x9'){const w=Math.min(W,580);return[w,Math.round(w*9/16)]}
  return[Math.min(W,mH),Math.min(W,mH)];
}

function srand(sd){let s=(sd*999983)|0||1;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}

function genShapes(){
  const[cw,ch]=csz(),r=srand(S.seed*99999|0);
  const t=Object.keys(S.shTypes).filter(k=>S.shTypes[k]);
  if(!t.length){S.shapes=[];return}
  S.shapes=Array.from({length:S.shCount},()=>({
    type:t[Math.floor(r()*t.length)],
    x:r()*cw,y:r()*ch,
    sz:S.shSize*(0.3+r()*1.4),
    col:S.pal.c[Math.floor(r()*S.pal.c.length)],
    rot:r()*Math.PI*2
  }));
}

function rrect(c,x,y,w,h,rad){
  rad=Math.min(rad,w/2,h/2);
  c.beginPath();c.moveTo(x+rad,y);
  c.lineTo(x+w-rad,y);c.quadraticCurveTo(x+w,y,x+w,y+rad);
  c.lineTo(x+w,y+h-rad);c.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);
  c.lineTo(x+rad,y+h);c.quadraticCurveTo(x,y+h,x,y+h-rad);
  c.lineTo(x,y+rad);c.quadraticCurveTo(x,y,x+rad,y);
  c.closePath();
}

function drawSh(c,s){
  c.save();c.translate(s.x,s.y);c.rotate(s.rot);
  c.globalAlpha=S.shOpac;c.fillStyle=s.col;
  const rad=(S.shRound/100)*(s.sz/2);
  if(s.type==='circle'){c.beginPath();c.arc(0,0,s.sz/2,0,Math.PI*2);c.fill()}
  else if(s.type==='square'){rrect(c,-s.sz/2,-s.sz/2,s.sz,s.sz,rad);c.fill()}
  else{const r=s.sz/2;c.beginPath();c.moveTo(0,-r);c.lineTo(r*.866,r*.5);c.lineTo(-r*.866,r*.5);c.closePath();c.fill()}
  c.restore();
}

function drawBg(c,cw,ch){
  if(S.noBg)return;
  if(S.bgMode==='gradient'){
    const g=S.grad,a=g.angle*Math.PI/180;
    const dx=Math.cos(a),dy=Math.sin(a);
    const gr=c.createLinearGradient(
      cw/2-dx*cw/2,ch/2-dy*ch/2,
      cw/2+dx*cw/2,ch/2+dy*ch/2
    );
    g.stops.forEach(s=>gr.addColorStop(s.p,s.c));
    c.fillStyle=gr;
  } else {
    c.fillStyle=S.bgColor;
  }
  c.fillRect(0,0,cw,ch);
}

// Important:
// Fisheye/arc/wave effects are implemented as unified warp of glyph outlines.
// Text is converted to vector paths and path points are warped
// in a shared deformation field. getTransform is fallback for canvas text only.

function warpPt(px,py,cx,cy,hW,hH,P){
  let x=px,y=py;
  const u=hW>0?(px-cx)/hW:0;
  const v=(P.nLines>1&&hH>0)?(py-cy)/hH:0;
  if(P.fisheye>0){
    const t=P.fisheye/100;
    const maxA=1.3;
    const theta=u*maxA;
    const cosT=Math.cos(theta);
    const R=hW/Math.sin(maxA);
    const circleR=Math.sqrt(Math.max(0.01,1-v*v*.85));
    const nx=cx+Math.sin(theta)*R*circleR;
    const df=(1+cosT)/2;
    const yS=0.08+2.5*df;
    const ny=cy+(py-cy)*yS;
    x=px+(nx-px)*t;
    y=py+(ny-py)*t;
  }
  if(P.arcUp>0){
    const t=P.arcUp/100;
    const curve=1-u*u;
    const botY=cy+hH;
    y=botY+(y-botY)*(1+t*1.5*curve);
  }
  if(P.arcDown>0){
    const t=P.arcDown/100;
    const curve=1-u*u;
    const topY=cy-hH;
    y=topY+(y-topY)*(1+t*1.5*curve);
  }
  if(P.wave>0){
    const t=P.wave/100;
    const d=y-cy;
    y=cy+d*(1+t*0.5*Math.sin(u*Math.PI*3));
  }
  return{x,y};
}

function warpCmds(cmds,cx,cy,hW,hH,P){
  return cmds.map(c=>{
    if(c.type==='Z')return c;
    const w=p=>warpPt(p.x,p.y,cx,cy,hW,hH,P);
    const r={type:c.type};
    if(c.type==='M'||c.type==='L'){const p=w(c);r.x=p.x;r.y=p.y}
    else if(c.type==='Q'){const p1=w({x:c.x1,y:c.y1}),p=w(c);r.x1=p1.x;r.y1=p1.y;r.x=p.x;r.y=p.y}
    else if(c.type==='C'){const p1=w({x:c.x1,y:c.y1}),p2=w({x:c.x2,y:c.y2}),p=w(c);r.x1=p1.x;r.y1=p1.y;r.x2=p2.x;r.y2=p2.y;r.x=p.x;r.y=p.y}
    return r;
  });
}

function cmdsToP2D(cmds){
  const p=new Path2D();
  for(const c of cmds){
    switch(c.type){
      case'M':p.moveTo(c.x,c.y);break;case'L':p.lineTo(c.x,c.y);break;
      case'C':p.bezierCurveTo(c.x1,c.y1,c.x2,c.y2,c.x,c.y);break;
      case'Q':p.quadraticCurveTo(c.x1,c.y1,c.x,c.y);break;
      case'Z':p.closePath();break;
    }
  }
  return p;
}

function getTransform(nx){
  let sy=1,sx=1;
  if(S.arcUp>0){const t=S.arcUp/100;sy*=1+t*1.2*Math.cos(nx*Math.PI*0.5)}
  if(S.arcDown>0){const t=S.arcDown/100;sy*=1+t*1.2*Math.cos(nx*Math.PI*0.5)}
  if(S.fisheye>0){const t=S.fisheye/100;const c=Math.pow(Math.cos(Math.abs(nx)*Math.PI*0.5),1.5);sy*=(1-t)+t*(0.15+2.5*c);sx*=(1-t)+t*(0.4+1.6*c)}
  if(S.wave>0){const t=S.wave/100;sy*=1+t*0.5*Math.sin(nx*Math.PI*3)}
  return{sx,sy,rot:0};
}

function renderText(c,cw,ch){
  const font=getFont();
  const lines=S.text.split('\n');
  const fSz=S.fs,lineH=fSz*S.lead;
  const fStr=`${S.fw} ${fSz}px 'PP Neue Montreal','Inter','DM Sans',system-ui,sans-serif`;
  c.font=fStr;c.textBaseline='alphabetic';
  const nLines=lines.length;
  const blockH=fSz+(nLines-1)*lineH;
  const baseY0=cw?ch/2-blockH/2+fSz*.82:0;
  if(S.blur>0)c.filter=`blur(${S.blur}px)`;
  const mode=(S.arcUp>0||S.arcDown>0||S.fisheye>0||S.wave>0);
  const doStroke=S.strokeW>0;
  const usePathWarp=font&&mode;
  const warpP={fisheye:S.fisheye,arcUp:S.arcUp,arcDown:S.arcDown,wave:S.wave,nLines:lines.length};

  if(usePathWarp){
    // --- PATH-BASED WARP: all lines warped as unified block ---
    c.font=fStr;
    const blockCmds=[];
    let maxW=0;
    const lineWidths=[];
    for(let ln=0;ln<lines.length;ln++){
      const lineY=ln*lineH;
      let x=0;
      const chars=lines[ln].split('');
      for(const ch2 of chars){
        if(ch2===' '){const sg=font.charToGlyph(' ');x+=(sg?sg.advanceWidth*(fSz/font.unitsPerEm):fSz*.3)+S.track;continue}
        const glyph=font.charToGlyph(ch2);
        if(!glyph||glyph.index===0){x+=fSz*.5+S.track;continue}
        const path=glyph.getPath(x,lineY,fSz);
        let cmds=path.commands;
        if(S.roundness>0)cmds=roundPathCorners(cmds,S.roundness);
        blockCmds.push({cmds,lineIdx:ln,lineX:x});
        x+=glyph.advanceWidth*(fSz/font.unitsPerEm)+S.track;
      }
      const lw=x>0?x-S.track:0;
      lineWidths.push(lw);
      if(lw>maxW)maxW=lw;
    }
    const topY=-fSz*.82;
    const bottomY=(lines.length-1)*lineH+fSz*.18;
    const halfW=maxW/2;
    const halfH=(bottomY-topY)/2;
    const blockCY=(topY+bottomY)/2;

    const centeredCmds=[];
    for(const item of blockCmds){
      const lineOff=(maxW-lineWidths[item.lineIdx])/2;
      if(lineOff>0.5){
        centeredCmds.push(item.cmds.map(cmd=>{
          if(cmd.type==='Z')return cmd;
          const r={...cmd};
          if(r.x!==undefined)r.x+=lineOff;
          if(r.x1!==undefined)r.x1+=lineOff;
          if(r.x2!==undefined)r.x2+=lineOff;
          return r;
        }));
      }else{centeredCmds.push(item.cmds)}
    }

    c.save();
    c.translate(cw/2-halfW, baseY0);
    c.fillStyle=S.txColor;
    if(doStroke){c.strokeStyle=S.txColor;c.lineWidth=S.strokeW;c.lineJoin='round';c.miterLimit=2}
    for(const cmds of centeredCmds){
      const warped=warpCmds(cmds,halfW,blockCY,halfW,halfH,warpP);
      const p2d=cmdsToP2D(warped);
      if(doStroke)c.stroke(p2d);
      c.fill(p2d);
    }
    c.restore();

  }else{
    lines.forEach((line,li)=>{
    const baseY=baseY0+li*lineH;

    if(font&&S.roundness>0){
      // --- GLYPH PATHS WITHOUT WARP (roundness only) ---
      c.font=fStr;c.letterSpacing='0px';
      const chars=line.split('');
      let widths=chars.map(ch2=>{
        const g=getCachedGlyph(font,ch2,fSz,S.roundness);
        return g?(g.advance+S.track):(c.measureText(ch2).width+S.track);
      });
      const totalW=widths.reduce((a,b)=>a+b,0);
      let curX=cw/2-totalW/2;
      chars.forEach((ch2,ci)=>{
        c.save();c.fillStyle=S.txColor;
        if(doStroke){c.strokeStyle=S.txColor;c.lineWidth=S.strokeW;c.lineJoin='round';c.miterLimit=2}
        const gd=getCachedGlyph(font,ch2,fSz,S.roundness);
        if(gd){
          c.translate(curX,baseY);
          if(doStroke)c.stroke(gd.path);
          c.fill(gd.path);
        }else{
          c.textAlign='left';c.fillText(ch2,curX,baseY);
        }
        c.restore();
        curX+=widths[ci];
      });

    }else{
      // --- CANVAS TEXT FALLBACK ---
      c.font=fStr;c.letterSpacing='0px';
      const chars=line.split('');
      const widths=chars.map(ch2=>c.measureText(ch2).width+S.track);
      const totalW=widths.reduce((a,b)=>a+b,0);
      let curX=cw/2-totalW/2;
      chars.forEach((ch2,ci)=>{
        const charW=widths[ci];const charCX=curX+charW/2;
        const nx=totalW>0?((charCX-(cw/2-totalW/2))/totalW)*2-1:0;
        const tr=mode?getTransform(nx):{sx:1,sy:1,rot:0};
        c.save();c.fillStyle=S.txColor;c.textAlign='center';
        if(doStroke){c.strokeStyle=S.txColor;c.lineWidth=S.strokeW;c.lineJoin='round';c.miterLimit=2}
        const gcY=baseY-fSz*.41;
        c.translate(charCX,gcY);c.scale(tr.sx,tr.sy);
        if(doStroke)c.strokeText(ch2,0,fSz*.41);
        c.fillText(ch2,0,fSz*.41);
        c.restore();
        curX+=charW;
      });
    }
    });
  }
  c.filter='none';
}

function renderCanvas(){
  const[cw,ch]=csz();
  const dpr=window.devicePixelRatio||1;
  cv.width=cw*dpr;cv.height=ch*dpr;
  cv.style.width=cw+'px';cv.style.height=ch+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  if(S.noBg){const sz=12;for(let y=0;y<ch;y+=sz)for(let x=0;x<cw;x+=sz){cx.fillStyle=(x/sz+y/sz)%2?'#e8e8e8':'#fff';cx.fillRect(x,y,sz,sz)}}
  drawBg(cx,cw,ch);
  cx.globalAlpha=1;
  S.shapes.forEach(s=>drawSh(cx,s));
  cx.globalAlpha=1;
  renderText(cx,cw,ch);
}

function render(){genShapes();renderCanvas()}

function exportC(type){
  const[cw,ch]=csz();
  const ew=S.fmt==='custom'?S.customW:cw*3;
  const eh=S.fmt==='custom'?S.customH:ch*3;
  const sx=ew/cw,sy=eh/ch;
  const ec=document.createElement('canvas');
  ec.width=ew;ec.height=eh;
  const ex=ec.getContext('2d');
  ex.setTransform(sx,0,0,sy,0,0);
  if(type==='jpg'){drawBg(ex,cw,ch);if(S.noBg){ex.fillStyle='#fff';ex.fillRect(0,0,cw,ch)}}
  else{if(!S.noBg)drawBg(ex,cw,ch)}
  ex.globalAlpha=1;
  S.shapes.forEach(s=>drawSh(ex,s));
  ex.globalAlpha=1;
  renderText(ex,cw,ch);
  const a=document.createElement('a');
  a.download='type-studio.'+(type==='jpg'?'jpg':'png');
  a.href=type==='jpg'?ec.toDataURL('image/jpeg',0.95):ec.toDataURL('image/png');
  a.click();
}

// Build pickers
function buildTC(){
  const el=document.getElementById('tcP');el.innerHTML='';
  TXC.forEach(c=>{
    const d=document.createElement('div');
    d.className='sw'+(c===S.txColor?' a':'');
    d.style.cssText=`background:${c};${c==='#ffffff'?'box-shadow:inset 0 0 0 0.5px #ccc':''}`;
    d.onclick=()=>{S.txColor=c;buildTC();render()};
    el.appendChild(d);
  });
  const ci=document.createElement('input');
  ci.type='color';ci.value=S.txColor;
  ci.style.cssText='width:18px;height:18px;border:none;padding:0;cursor:pointer;border-radius:50%';
  ci.oninput=()=>{S.txColor=ci.value;render()};
  el.appendChild(ci);
}
function buildBC(){
  const el=document.getElementById('bcP');el.innerHTML='';
  if(S.bgMode==='gradient'){el.style.display='none';document.getElementById('gradientPanel').style.display='block';return}
  el.style.display='flex';document.getElementById('gradientPanel').style.display='none';
  BGC.forEach(c=>{
    const d=document.createElement('div');
    d.className='sw'+(c===S.bgColor?' a':'');
    d.style.cssText=`background:${c};box-shadow:inset 0 0 0 0.5px rgba(0,0,0,0.15)`;
    d.onclick=()=>{S.bgColor=c;buildBC();render()};
    el.appendChild(d);
  });
  const ci=document.createElement('input');
  ci.type='color';ci.value=S.bgColor;
  ci.style.cssText='width:18px;height:18px;border:none;padding:0;cursor:pointer;border-radius:50%';
  ci.oninput=()=>{S.bgColor=ci.value;render()};
  el.appendChild(ci);
}
function buildGR(){
  const el=document.getElementById('grPick');el.innerHTML='';
  GRADS.forEach(g=>{
    const d=document.createElement('div');
    d.className='gr-prev'+(g.n===S.grad.n?' a':'');
    const a=g.angle,stops=g.stops.map(s=>`${s.c} ${Math.round(s.p*100)}%`).join(',');
    d.style.background=`linear-gradient(${a}deg,${stops})`;
    d.title=g.n;
    d.onclick=()=>{S.grad=g;buildGR();render()};
    el.appendChild(d);
  });
}
function buildPP(){
  const el=document.getElementById('pP');el.innerHTML='';
  PAL.forEach(p=>{
    const d=document.createElement('div');
    d.className='pl'+(p.n===S.pal.n?' a':'');
    p.c.forEach(c=>{const s=document.createElement('span');s.style.background=c;d.appendChild(s)});
    d.title=p.n;
    d.onclick=()=>{S.pal=p;buildPP();render()};
    el.appendChild(d);
  });
}

function wire(){
  document.getElementById('tI').oninput=e=>{S.text=e.target.value||' ';e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';render()};
  const sl=[
    ['s1','fs','v1'],['s2','fw','v2'],
    ['sSW','strokeW','vSW',v=>parseFloat(v).toFixed(1)],
    ['s3','lead','v3',v=>parseFloat(v).toFixed(2)],
    ['s4','track','v4'],
    ['s5','arcUp','v5'],['s6','arcDown','v6'],
    ['s7','fisheye','v7'],['s8','wave','v8'],
    ['s9','blur','v9',v=>parseFloat(v).toFixed(1)],
    ['s10','roundness','v10',v=>parseFloat(v).toFixed(1)],
    ['sA','shCount','vA'],['sB','shSize','vB'],
    ['sC','shOpac','vC',v=>parseFloat(v).toFixed(2)],
    ['sD','shRound','vD'],
  ];
  sl.forEach(([id,key,lbl,fmt])=>{
    const el=document.getElementById(id),lb=document.getElementById(lbl);
    el.oninput=()=>{S[key]=parseFloat(el.value);lb.textContent=fmt?fmt(el.value):el.value;if(key==='roundness'||key==='fw')Object.keys(glyphCache).forEach(k=>delete glyphCache[k]);render()};
  });

  document.getElementById('fmtB').onclick=e=>{
    if(!e.target.dataset.f)return;
    document.querySelectorAll('#fmtB .sb').forEach(b=>b.classList.remove('a'));
    e.target.classList.add('a');S.fmt=e.target.dataset.f;
    document.getElementById('customSize').style.display=S.fmt==='custom'?'flex':'none';
    render();
  };
  document.getElementById('cwIn').oninput=e=>{S.customW=Math.max(100,parseInt(e.target.value)||1080);render()};
  document.getElementById('chIn').oninput=e=>{S.customH=Math.max(100,parseInt(e.target.value)||1080);render()};
  document.getElementById('noBgBtn').onclick=()=>{S.noBg=!S.noBg;document.getElementById('noBgBtn').classList.toggle('a');render()};
  document.getElementById('bgMode').onclick=e=>{
    if(!e.target.dataset.m)return;
    document.querySelectorAll('#bgMode .sb').forEach(b=>b.classList.remove('a'));
    e.target.classList.add('a');S.bgMode=e.target.dataset.m;buildBC();buildGR();render();
  };
  document.getElementById('shT').onclick=e=>{
    const s=e.target.dataset.s;if(!s)return;
    S.shTypes[s]=!S.shTypes[s];e.target.classList.toggle('a');render();
  };
  document.getElementById('rndBtn').onclick=()=>{S.seed=Math.random();render()};
  document.getElementById('rndClr').onclick=()=>{
    S.bgColor=BGC[Math.floor(Math.random()*BGC.length)];
    S.txColor=TXC[Math.floor(Math.random()*TXC.length)];
    S.pal=PAL[Math.floor(Math.random()*PAL.length)];
    S.grad=GRADS[Math.floor(Math.random()*GRADS.length)];
    S.seed=Math.random();
    buildTC();buildBC();buildGR();buildPP();render();
  };
